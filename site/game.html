              <span class="game-rating">★ ${game.rating}</span>
              <span class="game-author">by ${game.author}</span>
              <span class="game-cat-badge">${game.cat}</span>
            </div>
          </div>
        </div>
      </div>

      <div class="play-area">
        <div class="play-area-top">
          <div class="play-area-title">🎮 Play ${game.name}</div>
        </div>
        <div class="play-content">
          ${embedHTML}
          <a class="play-btn-main" href="${game.itchUrl}">
            ▶ Play Now — Free
          </a>
        </div>
      </div>

      <!-- AD MID -->
      <div class="ad-mid"><span class="ad-label">Advertisement</span></div>

      <div class="game-desc-section">
        <div class="section-title">About the Game</div>
        <div class="game-desc">${game.desc}</div>
      </div>

      <div class="game-desc-section">
        <div class="section-title">How to Play</div>
        <div class="howto">${game.howto}</div>
      </div>

      <div class="game-desc-section">
        <div class="section-title">Tags</div>
        <div class="tags-wrap">${tagsHTML}</div>
      </div>

    </div>

    <div class="sidebar" style="animation: fadeUp 0.4s 0.1s ease both">
      <div class="ad-sidebar"><span class="ad-label">Advertisement</span></div>

      <div class="related-section">
        <div class="related-title">More Games</div>
        ${relatedHTML}
      </div>

      <div class="ad-sidebar2"><span class="ad-label">Advertisement</span></div>
    </div>
  `;
}
</script>
</body>
</html>
