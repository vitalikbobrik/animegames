<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #05080f; --surface: #0a0f1e; --surface2: #0f1628;
  --border: #1a2540; --accent: #ff6b00; --accent2: #00aaff;
  --text: #f0f4ff; --muted: #5a7099;
}
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; }
body::before {
  content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: radial-gradient(ellipse at 20% 20%, rgba(255,107,0,0.06) 0%, transparent 50%),
              radial-gradient(ellipse at 80% 80%, rgba(0,170,255,0.04) 0%, transparent 50%);
}

header {
  position: sticky; top: 0; z-index: 200;
  background: rgba(5,8,15,0.95); backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,107,0,0.2);
  padding: 0 40px; height: 64px;
  display: flex; align-items: center; gap: 20px;
}
.logo { font-family: 'Bangers', cursive; letter-spacing: 2px; font-size: 22px; color: var(--text); text-decoration: none; display: flex; align-items: center; gap: 10px; }
.logo-icon { width: 34px; height: 34px; background: linear-gradient(135deg, var(--accent), #ff3300); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; box-shadow: 0 0 16px rgba(255,107,0,0.4); }
.logo span { color: var(--accent); }

main {
  position: relative; z-index: 10;
  max-width: 600px; margin: 0 auto;
  padding: 48px 24px 80px;
}

.page-header { text-align: center; margin-bottom: 40px; }
.page-title { font-family: 'Bangers', cursive; letter-spacing: 2px; font-size: 48px; color: var(--text); margin-bottom: 8px; }
.page-title span { color: var(--accent); text-shadow: 0 0 20px rgba(255,107,0,0.4); }
.page-sub { font-size: 14px; color: var(--muted); line-height: 1.6; }

.contact-form {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 32px;
}

.form-group { margin-bottom: 20px; }
label { display: block; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }

input, textarea, select {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px;
  padding: 12px 16px;
  outline: none;
  border-radius: 6px;
  transition: border-color 0.2s, box-shadow 0.2s;
  resize: none;
}
input:focus, textarea:focus, select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 12px rgba(255,107,0,0.15);
}
input::placeholder, textarea::placeholder { color: var(--muted); }
textarea { height: 140px; }

select option { background: var(--surface2); }

.submit-btn {
  width: 100%;
  background: linear-gradient(135deg, var(--accent), #cc4400);
  color: white; border: none;
  font-family: 'Bangers', cursive;
  letter-spacing: 2px;
  font-size: 18px; padding: 14px;
  border-radius: 6px; cursor: pointer;
  transition: opacity 0.2s, transform 0.2s;
  box-shadow: 0 4px 20px rgba(255,107,0,0.3);
  margin-top: 8px;
}
.submit-btn:hover { opacity: 0.9; transform: translateY(-1px); }
.submit-btn:active { transform: translateY(0); }

.success-msg {
  display: none;
  text-align: center;
  padding: 32px;
  background: rgba(255,107,0,0.05);
  border: 1px solid rgba(255,107,0,0.3);
  border-radius: 8px;
  margin-top: 20px;
}
.success-msg .icon { font-size: 48px; margin-bottom: 12px; }
.success-msg h3 { font-family: 'Bangers', cursive; letter-spacing: 2px; font-size: 28px; color: var(--accent); margin-bottom: 8px; }
.success-msg p { font-size: 14px; color: var(--muted); }

footer {
  position: relative; z-index: 10;
  border-top: 1px solid rgba(255,107,0,0.1);
  padding: 24px 40px;
  display: flex; align-items: center; justify-content: space-between;
}
.footer-logo { font-family: 'Bangers', cursive; letter-spacing: 2px; font-size: 16px; color: var(--accent); }
.footer-links { display: flex; gap: 20px; }
.footer-links a { font-size: 12px; color: var(--muted); text-decoration: none; transition: color 0.2s; }
.footer-links a:hover { color: var(--accent2); }
.footer-copy { font-size: 11px; color: rgba(90,112,153,0.4); }

@media (max-width: 600px) {
  header { padding: 0 16px; }
  main { padding: 32px 16px 60px; }
  .contact-form { padding: 20px; }
  footer { flex-direction: column; gap: 12px; text-align: center; padding: 20px 16px; }
}
</style>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2216%22 fill=%22%23ff6b00%22/><text y=%22.85em%22 font-size=%2278%22 x=%2250%25%22 text-anchor=%22middle%22>⛩</text></svg>">
</head>
<body>

<header>
  <a class="logo" href="index.html">
    <div class="logo-icon">⛩</div>
    Anime<span>Games</span>.Online
  </a>
</header>

<main>
  <div class="page-header">
    <div class="page-title">Contact <span>Us</span></div>
    <p class="page-sub">Have a question, want to submit a game, or just say hi? We'd love to hear from you.</p>
  </div>

  <div class="contact-form">
    <form id="contactForm" action="https://formspree.io/f/myklzapz" method="POST">

      <div class="form-group">
        <label for="name">Your Name</label>
        <input type="text" id="name" name="name" placeholder="Naruto Uzumaki" required>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>

      <div class="form-group">
        <label for="subject">Subject</label>
        <select id="subject" name="subject">
          <option value="general">General Question</option>
          <option value="submit" href="submit.html">Submit a Game</option>
          <option value="bug">Report a Bug</option>
          <option value="partnership">Partnership</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="Write your message here..." required></textarea>
      </div>

      <button type="submit" class="submit-btn">⚡ Send Message</button>
    </form>

    <div class="success-msg" id="successMsg">
      <div class="icon">✅</div>
      <h3>Message Sent!</h3>
      <p>Thanks for reaching out. We'll get back to you as soon as possible.</p>
    </div>
  </div>
</main>

<footer>
  <div class="footer-logo">⛩ AnimeGames.Online</div>
  <div class="footer-links">
    <a href="index.html">Games</a>
    <a href="privacy.html">Privacy</a>
  </div>
  <div class="footer-copy">© 2025 AnimeGames.Online</div>
</footer>

<script>
document.getElementById('contactForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const form = this;
  const btn = form.querySelector('.submit-btn');
  btn.textContent = 'Sending...';
  btn.disabled = true;

  try {
    const res = await fetch(form.action, {
      method: 'POST',
      body: new FormData(form),
      headers: { 'Accept': 'application/json' }
    });

    if (res.ok) {
      form.style.display = 'none';
      document.getElementById('successMsg').style.display = 'block';
    } else {
      btn.textContent = '⚡ Send Message';
      btn.disabled = false;
      alert('Something went wrong. Please try again.');
    }
  } catch {
    btn.textContent = '⚡ Send Message';
    btn.disabled = false;
    alert('Something went wrong. Please try again.');
  }
});
</script>

</body>
</html>
