<script>
const gameId = 'intertwine';
const game = GAMES.find(g => g.id === gameId);

if (!game) {
  document.getElementById('notFound').style.display = 'block';
} else {
  // Update meta
  document.title = `${game.name} — Play Free Online · AnimeGames.Online`;
  document.querySelector('meta[name="description"]').content =
    `Play ${game.name} free online. ${game.desc.slice(0, 120)}...`;

  document.getElementById('breadcrumbGame').textContent = game.name;

  // Related games (same cat, exclude current)
  const related = GAMES.filter(g => g.cat === game.cat && g.id !== game.id).slice(0, 4);
  const relatedOther = GAMES.filter(g => g.id !== game.id && !related.find(r => r.id === g.id)).slice(0, Math.max(0, 4 - related.length));
  const relatedAll = [...related, ...relatedOther].slice(0, 4);

  const relatedHTML = relatedAll.map(g => `
    <div class="related-card" onclick="location.href='/games/'+g.id+'/'">
      <div class="related-icon">${g.icon}</div>
      <div class="related-info">
        <div class="related-name">${g.name}</div>
        <div class="related-meta">${g.cat} · ★ ${g.rating}</div>
      </div>
    </div>`).join('');

  const embedHTML = game.itchId
    ? `<div class="itch-embed"><iframe src="https://itch.io/embed/${game.itchId}" width="100%" height="167" frameborder="0"></iframe></div>`
    : '';

  const tagsHTML = game.tags.map(t => `<span class="tag">#${t}</span>`).join('');

  document.getElementById('mainContent').innerHTML = `
    <div class="game-main" style="animation: fadeUp 0.4s ease both">

      <!-- AD TOP -->
      <div class="ad-slot"><span class="ad-label">Advertisement</span></div>

      <div class="game-header">
        <div class="game-icon-title">
          <div class="game-big-icon">${game.icon}</div>
          <div>
            <div class="game-title">${game.name}</div>
            <div class="game-title-sub">
              <span class="game-rating">★ ${game.rating}</span>

        <div class="play-content">

      </div>

      </div>

        <div class="tags-wrap">${tagsHTML}</div>
      </div>

    </div>

    <div class="sidebar" style="animation: fadeUp 0.4s 0.1s ease both">
      <div class="ad-sidebar"><span class="ad-label">Advertisement</span></div>

        <div class="related-title">More Games</div>
        ${relatedHTML}
      </div>

      <div class="ad-sidebar2"><span class="ad-label">Advertisement</span></div>
    </div>
  `;
}
